<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Digital - SMKN 5 Kota Bekasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <!-- Halaman Login -->
    <div id="login-page" class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8 border border-gray-200">
            <div class="text-center mb-8">
                <div class="mx-auto w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center text-white text-2xl font-bold mb-3 shadow-md">RPL</div>
                <h2 class="text-2xl font-bold text-gray-800">SMKN 5 KOTA BEKASI</h2>
                <p class="text-sm text-gray-500 mt-1">Sistem Absensi Terpadu</p>
            </div>
            
            <div id="login-error" class="hidden mb-4 p-3 bg-red-100 text-red-700 text-sm rounded-lg border border-red-200 text-center">
                NIS tidak terdaftar atau password salah!
            </div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="mb-4">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                    <input type="text" id="username" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition" required>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                    <input type="password" id="password" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition" required>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition shadow-md">Masuk ke Sistem</button>
            </form>
        </div>
    </div>

    <!-- Halaman Dashboard -->
    <div id="dashboard-page" class="hidden min-h-screen flex flex-col">
        <header class="bg-blue-700 text-white shadow-md px-6 py-4 flex justify-between items-center">
            <h1 class="text-lg font-bold tracking-wide">E-ABSENSI SMKN 5</h1>
            <button onclick="handleLogout()" class="bg-red-500 hover:bg-red-600 text-white text-sm font-medium px-4 py-2 rounded-lg transition">Keluar</button>
        </header>

        <main class="flex-1 max-w-4xl w-full mx-auto p-4 md:p-6 space-y-6">
            
            <!-- Notifikasi Lupa Absen Pulang -->
            <div id="warning-pulang" class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-4 rounded shadow">
                <p class="font-bold">Peringatan!</p>
                <p class="text-sm">Anda tercatat tidak melakukan Absen Pulang pada hari sebelumnya.</p>
            </div>

            <!-- Profil Singkat -->
            <div class="bg-white rounded-xl shadow p-6 border border-gray-200 flex justify-between items-center">
                <div>
                    <h2 id="student-name" class="text-xl font-bold text-gray-800">-</h2>
                    <p class="text-gray-500 text-sm mt-1">NIS: <span id="student-nis">-</span> | <span id="student-class" class="font-semibold">-</span></p>
                </div>
            </div>

            <!-- Form Absensi -->
            <div class="bg-white rounded-xl shadow border border-gray-200 overflow-hidden">
                <div class="p-5 bg-gray-50 border-b border-gray-200 flex justify-between items-center">
                    <h3 class="font-bold text-gray-800">Isi Kehadiran Hari Ini</h3>
                    <p class="text-xs text-gray-500 font-bold" id="live-time">-</p>
                </div>
                <div class="p-6">
                    <form id="attendance-form" onsubmit="submitAttendance(event)" class="space-y-5">
                        
                        <!-- TIPE ABSENSI -->
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Tipe Absensi</label>
                            <div class="grid grid-cols-2 gap-3">
                                <label id="label-masuk" class="border border-gray-200 rounded-lg p-3 flex items-center justify-center gap-2 cursor-pointer transition">
                                    <input type="radio" name="tipe_absen" value="Masuk" checked class="text-blue-600 focus:ring-blue-500" onchange="validateForm()">
                                    <span class="text-sm font-medium text-gray-700">Masuk (06.30)</span>
                                </label>
                                <label id="label-pulang" class="border border-gray-200 rounded-lg p-3 flex items-center justify-center gap-2 cursor-pointer transition">
                                    <input type="radio" name="tipe_absen" value="Pulang" class="text-purple-600 focus:ring-purple-500" onchange="validateForm()">
                                    <span class="text-sm font-medium text-gray-700">Pulang (15.00)</span>
                                </label>
                            </div>
                            <p id="absen-msg" class="text-xs mt-2 text-red-600 hidden"></p>
                        </div>
                        
                        <!-- Status Kehadiran -->
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Keterangan</label>
                            <div class="grid grid-cols-3 gap-3">
                                <label class="border border-gray-200 rounded-lg p-3 flex items-center justify-center gap-2 cursor-pointer hover:bg-green-50 transition">
                                    <input type="radio" name="status" value="Hadir" checked class="text-green-600 focus:ring-green-500" onchange="toggleAttachment()">
                                    <span class="text-sm font-medium text-gray-700">Hadir</span>
                                </label>
                                <label class="border border-gray-200 rounded-lg p-3 flex items-center justify-center gap-2 cursor-pointer hover:bg-yellow-50 transition">
                                    <input type="radio" name="status" value="Izin" class="text-yellow-600 focus:ring-yellow-500" onchange="toggleAttachment()">
                                    <span class="text-sm font-medium text-gray-700">Izin</span>
                                </label>
                                <label class="border border-gray-200 rounded-lg p-3 flex items-center justify-center gap-2 cursor-pointer hover:bg-red-50 transition">
                                    <input type="radio" name="status" value="Sakit" class="text-red-600 focus:ring-red-500" onchange="toggleAttachment()">
                                    <span class="text-sm font-medium text-gray-700">Sakit</span>
                                </label>
                            </div>
                        </div>

                        <!-- Keterangan & Upload File (Tersembunyi jika Hadir) -->
                        <div id="attachment-section" class="hidden space-y-4 bg-gray-50 p-4 rounded-lg border border-gray-200">
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">Alasan Izin/Sakit</label>
                                <textarea id="keterangan-text" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Tuliskan alasan lengkap..."></textarea>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">Upload Bukti (Surat Dokter/Foto)</label>
                                <input type="file" id="file-upload" accept="image/*,.pdf" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                            </div>
                        </div>

                        <button type="submit" id="submit-btn" class="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-3 rounded-lg transition shadow-md">
                            Kirim Absensi
                        </button>
                    </form>
                </div>
            </div>

            <!-- Riwayat -->
            <div class="bg-white rounded-xl shadow border border-gray-200 overflow-hidden">
                <div class="p-5 bg-gray-50 border-b border-gray-200">
                    <h3 class="font-bold text-gray-800">Riwayat Anda (Perangkat Ini)</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse text-sm">
                        <thead>
                            <tr class="bg-gray-100 text-gray-600 uppercase tracking-wider font-semibold border-b">
                                <th class="px-4 py-3">Tanggal</th>
                                <th class="px-4 py-3">Tipe</th>
                                <th class="px-4 py-3">Status</th>
                                <th class="px-4 py-3">Info</th>
                            </tr>
                        </thead>
                        <tbody id="attendance-history-table" class="text-gray-700 divide-y divide-gray-100">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        // GANTI URL INI DENGAN URL WEB APP YANG BARU DIDEPLOY!
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxiiTeNP7C7SGWfw9i9h2CY2H61CR22XNeuAmvQO2d_205FANMhY1gDUXkE1QnNUhAZyA/exec";

        const studentsDatabase = [
            { nis: "242510001", name: "AHMAD RIFKY DEWANTO", class: "XII RPL 1" },
            { nis: "242510002", name: "AIRA ALVISA DHEA", class: "XII RPL 1" },
            { nis: "242510003", name: "ALYA AZZAHRA", class: "XII RPL 1" },
            // ... masukkan sisa data siswa ...
        ];

        let currentSessionUser = null;
        let fileBase64 = null;
        let fileMimeType = null;
        let fileName = null;

        window.onload = function() {
            setInterval(updateClock, 1000);
            const savedUser = localStorage.getItem('logged_in_student');
            if (savedUser) {
                currentSessionUser = JSON.parse(savedUser);
                showDashboard();
            }
        };

        function updateClock() {
            const now = new Date();
            document.getElementById('live-time').innerText = now.toLocaleString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function handleLogin(event) {
            event.preventDefault();
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value.trim();
            
            const student = studentsDatabase.find(s => s.nis === usernameInput && s.nis === passwordInput);
            if (student) {
                currentSessionUser = student;
                localStorage.setItem('logged_in_student', JSON.stringify(student));
                showDashboard();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function showDashboard() {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('dashboard-page').classList.remove('hidden');
            document.getElementById('student-name').innerText = currentSessionUser.name;
            document.getElementById('student-nis').innerText = currentSessionUser.nis;
            document.getElementById('student-class').innerText = currentSessionUser.class;

            checkAttendanceRules();
            renderAttendanceHistory();
        }

        // FUNGSI LOGIKA VALIDASI WAKTU
        function checkAttendanceRules() {
            const history = JSON.parse(localStorage.getItem('attendance_records')) || [];
            const myHistory = history.filter(r => r.nis === currentSessionUser.nis);
            
            const now = new Date();
            const todayStr = now.toLocaleDateString('id-ID');
            
            // Cek lupa absen pulang kemarin
            const yesterday = new Date(now);
            yesterday.setDate(yesterday.getDate() - 1);
            const yestStr = yesterday.toLocaleDateString('id-ID');
            
            const masukYest = myHistory.find(r => r.dateStr === yestStr && r.tipe === "Masuk");
            const pulangYest = myHistory.find(r => r.dateStr === yestStr && r.tipe === "Pulang");
            
            if (masukYest && !pulangYest) {
                document.getElementById('warning-pulang').classList.remove('hidden');
            } else {
                document.getElementById('warning-pulang').classList.add('hidden');
            }

            // Validasi Form Hari ini
            validateForm(myHistory, todayStr, now);
        }

        function validateForm(myHistoryParam, todayStrParam, nowParam) {
            const history = myHistoryParam || JSON.parse(localStorage.getItem('attendance_records')) || [];
            const myHistory = myHistoryParam ? history : history.filter(r => r.nis === currentSessionUser.nis);
            
            const now = nowParam || new Date();
            const todayStr = todayStrParam || now.toLocaleDateString('id-ID');

            const hasMasukToday = myHistory.some(r => r.dateStr === todayStr && r.tipe === "Masuk");
            const hasPulangToday = myHistory.some(r => r.dateStr === todayStr && r.tipe === "Pulang");

            const radioMasuk = document.querySelector('input[value="Masuk"]');
            const radioPulang = document.querySelector('input[value="Pulang"]');
            const btnSubmit = document.getElementById('submit-btn');
            const msg = document.getElementById('absen-msg');
            const currentHour = now.getHours();

            msg.classList.add('hidden');
            msg.innerText = "";
            btnSubmit.disabled = false;
            btnSubmit.classList.replace('bg-gray-400', 'bg-green-600');

            // Logic Absen Masuk (Hanya bisa 1x)
            if (hasMasukToday) {
                radioMasuk.disabled = true;
                document.getElementById('label-masuk').classList.add('opacity-50', 'bg-gray-100');
                if(radioMasuk.checked) radioPulang.checked = true; // Auto pindah ke pulang
            }

            // Logic Absen Pulang (Harus > Jam 15.00 dan hanya 1x)
            if (hasPulangToday) {
                radioPulang.disabled = true;
                document.getElementById('label-pulang').classList.add('opacity-50', 'bg-gray-100');
            } else if (currentHour < 15) {
                radioPulang.disabled = true;
                document.getElementById('label-pulang').classList.add('opacity-50', 'bg-gray-100');
            } else {
                radioPulang.disabled = false;
                document.getElementById('label-pulang').classList.remove('opacity-50', 'bg-gray-100');
            }

            // Pesan Peringatan & Kunci Tombol
            if (radioMasuk.checked && hasMasukToday) {
                btnSubmit.disabled = true;
                btnSubmit.classList.replace('bg-green-600', 'bg-gray-400');
                msg.innerText = "Anda sudah melakukan absen masuk hari ini.";
                msg.classList.remove('hidden');
            }

            if (radioPulang.checked) {
                if (currentHour < 15) {
                    btnSubmit.disabled = true;
                    btnSubmit.classList.replace('bg-green-600', 'bg-gray-400');
                    msg.innerText = "Absen pulang baru bisa dilakukan setelah jam 15.00.";
                    msg.classList.remove('hidden');
                }
                if (hasPulangToday) {
                    btnSubmit.disabled = true;
                    btnSubmit.classList.replace('bg-green-600', 'bg-gray-400');
                    msg.innerText = "Anda sudah melakukan absen pulang hari ini.";
                    msg.classList.remove('hidden');
                }
            }
        }

        // Tampilkan Upload Form jika Sakit/Izin
        function toggleAttachment() {
            const status = document.querySelector('input[name="status"]:checked').value;
            const attachSection = document.getElementById('attachment-section');
            if (status === 'Izin' || status === 'Sakit') {
                attachSection.classList.remove('hidden');
            } else {
                attachSection.classList.add('hidden');
            }
        }

        // Proses membaca file gambar/PDF
        document.getElementById('file-upload').addEventListener('change', function(e) {
            let file = e.target.files[0];
            if(file) {
                // Batasi file maks 3MB agar tidak memberatkan script
                if(file.size > 3 * 1024 * 1024) {
                    alert("Ukuran file terlalu besar! Maksimal 3MB.");
                    this.value = "";
                    return;
                }
                fileName = file.name;
                fileMimeType = file.type;
                let reader = new FileReader();
                reader.onload = function(event) {
                    fileBase64 = event.target.result.split("base64,")[1];
                }
                reader.readAsDataURL(file);
            }
        });

        function calculateLateMinutes() {
            const now = new Date();
            const target = new Date();
            target.setHours(6, 30, 0, 0); // Target jam masuk 06.30

            if (now > target) {
                const diffMs = now - target;
                return Math.floor(diffMs / 60000); // Konversi millisecond ke menit
            }
            return 0;
        }

        function submitAttendance(event) {
            event.preventDefault();
            
            const tipeAbsen = document.querySelector('input[name="tipe_absen"]:checked').value;
            const status = document.querySelector('input[name="status"]:checked').value;
            const keterangan = document.getElementById('keterangan-text').value;
            const submitBtn = document.getElementById('submit-btn');

            if(WEB_APP_URL === "PASTE_URL_WEB_APP_ANDA_DISINI") {
                alert("Masukkan URL Google Web App di dalam kode terlebih dahulu!"); return;
            }

            // Kalkulasi keterlambatan (Hanya untuk Tipe Masuk)
            let terlambatInfo = "-";
            if (tipeAbsen === "Masuk") {
                let lateMins = calculateLateMinutes();
                if (lateMins > 0) {
                    terlambatInfo = `Terlambat ${lateMins} menit`;
                } else {
                    terlambatInfo = "Tepat Waktu";
                }
            }

            submitBtn.innerText = "Mengirim Data & File...";
            submitBtn.disabled = true;
            submitBtn.classList.replace('bg-green-600', 'bg-gray-400');

            const now = new Date();
            const timestampFull = now.toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' });
            const dateOnlyStr = now.toLocaleDateString('id-ID');

            const newRecord = {
                date: timestampFull,
                dateStr: dateOnlyStr, // Untuk validasi filtering internal lokal
                nis: currentSessionUser.nis,
                name: currentSessionUser.name,
                class: currentSessionUser.class,
                tipe_absen: tipeAbsen,
                status: status,
                terlambat: terlambatInfo,
                keterangan: (status === 'Hadir') ? "-" : keterangan,
                
                // Data file jika ada
                fileName: fileName,
                mimeType: fileMimeType,
                fileData: fileBase64
            };

            fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newRecord)
            })
            .then(() => {
                let alertMsg = `Absensi ${tipeAbsen} BERHASIL dikirim!\n`;
                if(tipeAbsen === "Masuk" && terlambatInfo.includes("Terlambat")) {
                    alertMsg += `Peringatan: Anda ${terlambatInfo}.`;
                }
                alert(alertMsg);
                
                // Simpan ke local storage agar terbaca sistem gembok
                let totalHistory = JSON.parse(localStorage.getItem('attendance_records')) || [];
                // Data khusus untuk riwayat tampilan tabel
                totalHistory.unshift({
                    date: timestampFull,
                    dateStr: dateOnlyStr,
                    nis: currentSessionUser.nis,
                    tipe: tipeAbsen,
                    status: status,
                    infoTambahan: (tipeAbsen==="Masuk" ? terlambatInfo : keterangan)
                });
                localStorage.setItem('attendance_records', JSON.stringify(totalHistory));
                
                // Reset form file
                fileBase64 = null;
                fileName = null;
                document.getElementById('file-upload').value = "";
                document.getElementById('keterangan-text').value = "";
                
                checkAttendanceRules(); // Refresh aturan (kunci tombol)
                renderAttendanceHistory(); // Update tabel
            })
            .catch(() => alert("Gagal mengirim absensi. Cek koneksi internet Anda."))
            .finally(() => {
                submitBtn.innerText = "Kirim Absensi";
                submitBtn.disabled = false;
                submitBtn.classList.replace('bg-gray-400', 'bg-green-600');
            });
        }

        function renderAttendanceHistory() {
            const tableBody = document.getElementById('attendance-history-table');
            tableBody.innerHTML = '';

            const totalHistory = JSON.parse(localStorage.getItem('attendance_records')) || [];
            const studentHistory = totalHistory.filter(record => record.nis === currentSessionUser.nis);

            if (studentHistory.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="4" class="px-4 py-3 text-center text-gray-400 italic">Belum ada riwayat.</td></tr>`;
                return;
            }

            studentHistory.forEach(record => {
                let badge = 'bg-green-100 text-green-800';
                if (record.status === 'Izin') badge = 'bg-yellow-100 text-yellow-800';
                if (record.status === 'Sakit') badge = 'bg-red-100 text-red-800';

                // Menandai tulisan terlambat dengan warna merah
                let info = record.infoTambahan || "-";
                if(info.includes("Terlambat")) {
                    info = `<span class="text-red-600 font-semibold">${info}</span>`;
                }

                tableBody.innerHTML += `
                    <tr class="hover:bg-gray-50 border-b border-gray-50">
                        <td class="px-4 py-3 whitespace-nowrap">${record.date.split(', ')[1]}</td>
                        <td class="px-4 py-3 font-bold">${record.tipe}</td>
                        <td class="px-4 py-3"><span class="px-2 py-1 rounded text-xs font-semibold ${badge}">${record.status}</span></td>
                        <td class="px-4 py-3 text-xs text-gray-500 max-w-[120px] truncate" title="${record.infoTambahan}">${info}</td>
                    </tr>
                `;
            });
        }

        function handleLogout() {
            localStorage.removeItem('logged_in_student');
            currentSessionUser = null;
            document.getElementById('dashboard-page').classList.add('hidden');
            document.getElementById('login-page').classList.remove('hidden');
        }
    </script>
</body>
</html>
